{% extends 'core/base.html' %}
{% block title %}Регистрация - ПроСТО{% endblock %}
{% block content %}
<div class="text-center mb-4">
    <i class="fas fa-user-plus fa-3x" style="color: #A7D0CD;"></i>
    <h2 class="mt-2">Регистрация</h2>
</div>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <input type="text" name="username" class="form-control" placeholder="Имя пользователя" required>
    </div>
    <div class="mb-3">
        <input type="email" name="email" class="form-control" placeholder="Email">
    </div>
    <div class="mb-3">
        <input type="text" name="phone" class="form-control" placeholder="Телефон">
    </div>
    <div class="mb-3">
        <select name="role" class="form-select">
            <option value="client">Клиент</option>
            <option value="mechanic">Механик</option>
        </select>
    </div>
    <div class="mb-3">
        <input type="password" name="password1" class="form-control" placeholder="Пароль" required>
    </div>
    <div class="mb-3">
        <input type="password" name="password2" class="form-control" placeholder="Подтверждение пароля" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
</form>
<p class="text-center mt-3">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
{% endblock %}
