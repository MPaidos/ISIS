{% extends 'core/base.html' %}
{% load static %}
{% block title %}Запись - ПроСТО{% endblock %}
{% block content %}
<h4 class="mb-3"><i class="fas fa-calendar-alt me-2"></i>Запись на сервис</h4>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Автомобиль</label>
        {{ form.vehicle }}
    </div>
    <div class="mb-3">
        <label class="form-label">Услуги</label>
        <div class="border rounded p-3" style="background: #F9FBFB;">
            {{ form.services }}
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Дата</label>
        {{ form.date }}
    </div>
    <div class="mb-3">
        <label class="form-label">Время</label>
        {{ form.time }}
    </div>
    <button type="submit" class="btn btn-primary w-100">Записаться</button>
</form>
{% endblock %}
